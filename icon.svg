<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="32" fill="#f5f5f7" stroke="#d1d5db" stroke-width="1"/>
  <!-- Server rack unit 1 -->
  <rect x="55" y="52" width="90" height="24" rx="4" fill="none" stroke="#2563eb" stroke-width="2"/>
  <circle cx="72" cy="64" r="3" fill="#2563eb" opacity="0.6"/>
  <circle cx="82" cy="64" r="3" fill="#2563eb" opacity="0.4"/>
  <line x1="120" y1="60" x2="136" y2="60" stroke="#2563eb" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <line x1="120" y1="68" x2="136" y2="68" stroke="#2563eb" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <!-- Server rack unit 2 -->
  <rect x="55" y="82" width="90" height="24" rx="4" fill="none" stroke="#2563eb" stroke-width="2"/>
  <circle cx="72" cy="94" r="3" fill="#2563eb" opacity="0.6"/>
  <circle cx="82" cy="94" r="3" fill="#2563eb" opacity="0.3"/>
  <line x1="120" y1="90" x2="136" y2="90" stroke="#2563eb" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <line x1="120" y1="98" x2="136" y2="98" stroke="#2563eb" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <!-- Server rack unit 3 -->
  <rect x="55" y="112" width="90" height="24" rx="4" fill="none" stroke="#2563eb" stroke-width="2"/>
  <circle cx="72" cy="124" r="3" fill="#2563eb" opacity="0.5"/>
  <circle cx="82" cy="124" r="3" fill="#2563eb" opacity="0.5"/>
  <line x1="120" y1="118" x2="136" y2="118" stroke="#2563eb" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <line x1="120" y1="128" x2="136" y2="128" stroke="#2563eb" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <!-- Network nodes below -->
  <circle cx="75" cy="158" r="5" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.5"/>
  <circle cx="100" cy="158" r="5" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.5"/>
  <circle cx="125" cy="158" r="5" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.5"/>
  <!-- Connection lines from servers to nodes -->
  <line x1="80" y1="136" x2="75" y2="153" stroke="#2563eb" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  <line x1="100" y1="136" x2="100" y2="153" stroke="#2563eb" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  <line x1="120" y1="136" x2="125" y2="153" stroke="#2563eb" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  <!-- Cross connections -->
  <line x1="80" y1="158" x2="95" y2="158" stroke="#2563eb" stroke-width="0.8" opacity="0.2" stroke-linecap="round"/>
  <line x1="105" y1="158" x2="120" y2="158" stroke="#2563eb" stroke-width="0.8" opacity="0.2" stroke-linecap="round"/>
</svg>
