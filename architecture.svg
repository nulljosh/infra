<svg viewBox="0 0 700 320" width="700" height="320" xmlns="http://www.w3.org/2000/svg" style="font-family:monospace;background:#f8fafc;border-radius:12px">
  <text x="350" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">infra -- Infrastructure Monorepo</text>

  <!-- Root node -->
  <rect x="270" y="48" width="160" height="36" rx="8" fill="#0071e3"/>
  <text x="350" y="70" text-anchor="middle" font-size="11" fill="white" font-weight="bold">infra/</text>

  <!-- Lines from root -->
  <line x1="310" y1="84" x2="130" y2="130" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="330" y1="84" x2="310" y2="130" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="370" y1="84" x2="470" y2="130" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="390" y1="84" x2="610" y2="130" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- key-value-store -->
  <rect x="30" y="130" width="200" height="50" rx="8" fill="#16a34a"/>
  <text x="130" y="152" text-anchor="middle" font-size="11" fill="white" font-weight="bold">key-value-store</text>
  <text x="130" y="170" text-anchor="middle" font-size="9" fill="#dcfce7">Rust | 444 LOC | Complete</text>

  <!-- search-engine -->
  <rect x="240" y="130" width="200" height="50" rx="8" fill="#d97706"/>
  <text x="340" y="152" text-anchor="middle" font-size="11" fill="white" font-weight="bold">search-engine</text>
  <text x="340" y="170" text-anchor="middle" font-size="9" fill="#fef3c7">Python | 196 LOC | Partial</text>

  <!-- api-gateway -->
  <rect x="450" y="130" width="200" height="50" rx="8" fill="#16a34a"/>
  <text x="550" y="152" text-anchor="middle" font-size="11" fill="white" font-weight="bold">api-gateway</text>
  <text x="550" y="170" text-anchor="middle" font-size="9" fill="#dcfce7">Go | 2244 LOC | Complete</text>

  <!-- graphics-renderer (shifted to fit) -->
  <line x1="350" y1="84" x2="350" y2="210" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" opacity="0"/>
  <rect x="250" y="210" width="200" height="50" rx="8" fill="#16a34a"/>
  <text x="350" y="232" text-anchor="middle" font-size="11" fill="white" font-weight="bold">graphics-renderer</text>
  <text x="350" y="250" text-anchor="middle" font-size="9" fill="#dcfce7">Rust | 385 LOC | Complete</text>

  <!-- Line to graphics-renderer -->
  <line x1="350" y1="84" x2="350" y2="210" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Legend -->
  <rect x="30" y="280" width="12" height="12" rx="3" fill="#16a34a"/>
  <text x="48" y="290" font-size="9" fill="#475569">Complete</text>
  <rect x="110" y="280" width="12" height="12" rx="3" fill="#d97706"/>
  <text x="128" y="290" font-size="9" fill="#475569">Partial</text>
  <text x="550" y="290" text-anchor="middle" font-size="9" fill="#94a3b8">~3,300 LOC total</text>
</svg>
