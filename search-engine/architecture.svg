<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" width="420" height="520"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d2d2d7"/>
    </marker>
  </defs>

  <rect width="420" height="520" fill="white"/>

  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="14" font-weight="600" fill="#1d1d1f">Search Engine Pipeline</text>

  <!-- INGESTION section label -->
  <text x="210" y="54" text-anchor="middle" font-size="9" fill="#86868b" letter-spacing="2">INGESTION</text>

  <!-- 1. Crawler (amber) -->
  <rect x="130" y="64" width="160" height="36" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="210" y="87" text-anchor="middle" font-size="12" font-weight="500" fill="#92400e">Crawler</text>
  <line x1="210" y1="100" x2="210" y2="116" stroke="#d2d2d7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. Tokenizer (blue) -->
  <rect x="130" y="122" width="160" height="36" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="210" y="145" text-anchor="middle" font-size="12" font-weight="500" fill="#1d4ed8">Tokenizer</text>
  <line x1="210" y1="158" x2="210" y2="174" stroke="#d2d2d7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. Inverted Index (blue) -->
  <rect x="120" y="180" width="180" height="36" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="210" y="203" text-anchor="middle" font-size="12" font-weight="500" fill="#1d4ed8">Inverted Index</text>
  <line x1="210" y1="216" x2="210" y2="232" stroke="#d2d2d7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4. Document Store (gray) -->
  <rect x="120" y="238" width="180" height="36" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="210" y="261" text-anchor="middle" font-size="12" font-weight="500" fill="#374151">Document Store</text>

  <!-- Divider -->
  <line x1="60" y1="294" x2="360" y2="294" stroke="#e5e7eb" stroke-width="1"/>

  <!-- QUERY section label -->
  <text x="210" y="314" text-anchor="middle" font-size="9" fill="#86868b" letter-spacing="2">QUERY</text>

  <!-- 5. Query Parser (green) -->
  <rect x="120" y="322" width="180" height="36" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="210" y="345" text-anchor="middle" font-size="12" font-weight="500" fill="#166534">Query Parser</text>
  <line x1="210" y1="358" x2="210" y2="374" stroke="#d2d2d7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6. BM25 Ranker (green) -->
  <rect x="120" y="380" width="180" height="36" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="210" y="403" text-anchor="middle" font-size="12" font-weight="500" fill="#166534">BM25 Ranker</text>
  <line x1="210" y1="416" x2="210" y2="432" stroke="#d2d2d7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 7. REST API (purple) -->
  <rect x="130" y="438" width="160" height="36" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="210" y="461" text-anchor="middle" font-size="12" font-weight="500" fill="#5b21b6">REST API</text>

  <!-- Language label -->
  <text x="210" y="502" text-anchor="middle" fill="#86868b" font-size="10">Python 3.10+</text>
</svg>
